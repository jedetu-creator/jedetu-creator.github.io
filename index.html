<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jede Tu | AI Programmer Portfolio</title>

    <style>
        :root {
            --nintendo-red: #e60012;
            --nintendo-red-hover: #ff1a1a;
            --dark-deep: #0f0f0f;
            --dark-surface: #1a1a1a;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--dark-deep);
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 自定義捲動條 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-deep); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--nintendo-red); }

        /* 全域致中與區塊間距 */
        section {
            padding: 100px 0;
            display: flex;
            align-items: center;
            min-height: 60vh;
        }

        .container {
            max-width: 1100px;
        }

        /* 導覽列：磨砂玻璃效果 */
        .navbar {
            background: rgba(15, 15, 15, 0.8) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--nintendo-red) !important;
        }

        .nav-link {
            color: #fff !important;
            font-weight: 500;
            margin: 0 10px;
            transition: 0.3s;
            opacity: 0.8;
        }

        .nav-link:hover {
            color: var(--nintendo-red) !important;
            opacity: 1;
        }

        /* Hero 區塊 */
        .hero {
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #2a0a0a 0%, var(--dark-deep) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 80px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s ease-out;
        }

        .hero .highlight {
            color: var(--nintendo-red);
            text-shadow: 0 0 20px rgba(230, 0, 18, 0.4);
        }
